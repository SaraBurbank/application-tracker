<div class="board-header">
  <h1>Job Application Tracker</h1>
  <button class="btn-primary" (click)="openAddForm()">+ Add Application</button>
</div>

@if (loading()) {
  <p>Loading applications...</p>
}

@if (errorMessage()) {
  <p class="error">{{ errorMessage() }}</p>
}

@if (!loading() && !errorMessage()) {
  <div class="board" cdkDropListGroup>
    @for (status of statuses; track status) {
      <app-kanban-column
        [status]="status"
        [applications]="columns()[status]"
        (dropped)="onCardDropped($event)"
        (edit)="openEditForm($event)"
        (delete)="onDeleteApplication($event)"
      ></app-kanban-column>
    }
  </div>
}

@if (isFormOpen()) {
  <app-application-form
    [applicationToEdit]="applicationBeingEdited()"
    (saved)="onFormSaved()"
    (cancelled)="closeForm()"
  ></app-application-form>
}
